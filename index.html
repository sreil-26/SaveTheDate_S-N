<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Save the Date — Srushti & Neil</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --sand:    #F5ECD7;
      --deep:    #1C1208;
      --sunset:  #D4622A;
      --amber:   #E8A24A;
      --coral:   #E8866A;
      --sea:     #3A6B72;
      --muted:   rgba(28,18,8,0.45);
      --mutedlt: rgba(245,236,215,0.5);
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--sand);
      color: var(--deep);
      font-family: 'Jost', sans-serif;
      font-weight: 300;
      overflow-x: hidden;
    }

    /* ── PROGRESS LINE ── */
    #progress-line {
      position: fixed;
      top: 0; left: 0;
      width: 0%;
      height: 3px;
      background: linear-gradient(90deg, var(--coral), var(--amber), var(--sunset));
      z-index: 100;
      transition: width 0.1s linear;
    }

    /* ── WAVE SVG DIVIDERS ── */
    .wave-divider {
      width: 100%;
      overflow: hidden;
      line-height: 0;
      margin: 0;
    }
    .wave-divider svg { display: block; width: 100%; }

    /* ── SECTIONS ── */
    section {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 24px;
      position: relative;
    }

    /* ── REVEAL ANIMATION ── */
    .reveal {
      opacity: 0;
      transform: translateY(32px);
      transition: opacity 0.9s cubic-bezier(0.22,1,0.36,1),
                  transform 0.9s cubic-bezier(0.22,1,0.36,1);
    }
    .reveal.visible { opacity: 1; transform: translateY(0); }
    .reveal-delay-1 { transition-delay: 0.12s; }
    .reveal-delay-2 { transition-delay: 0.24s; }
    .reveal-delay-3 { transition-delay: 0.36s; }
    .reveal-delay-4 { transition-delay: 0.52s; }

    /* ── ACCENT LINE ── */
    .accent-line {
      width: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--sunset), transparent);
      margin: 28px auto;
      transition: width 1.2s cubic-bezier(0.22,1,0.36,1) 0.2s;
    }
    .accent-line.visible { width: 160px; }

    /* ══════════════════════════════
       HERO
     ══════════════════════════════ */
    #hero {
      min-height: 100vh;
      text-align: center;
      background: linear-gradient(
        170deg,
        #1C1208 0%,
        #3B200A 30%,
        #7A3318 55%,
        #D4622A 78%,
        #E8A24A 92%,
        #F5ECD7 100%
      );
      color: var(--sand);
      justify-content: center;
      gap: 0;
      padding-bottom: 0;
    }
